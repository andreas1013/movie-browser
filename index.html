<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Movie Browser TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#06070b;
      --panel:rgba(255,255,255,.07);
      --panel-hi:rgba(255,255,255,.13);
      --border:rgba(255,255,255,.10);
      --border-hi:rgba(255,255,255,.36);
      --text:rgba(255,255,255,.96);
      --text-2:rgba(255,255,255,.65);
      --text-3:rgba(255,255,255,.38);
      --gold:#ffd54a;
      --pad:56px;
      --card-w:340px;
      --card-gap:16px;
      --nav-h:68px;
      --radius:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:auto}
    body{
      font-family:"DM Sans",sans-serif;
      background:var(--bg);color:var(--text);
      overflow-x:hidden;overflow-y:scroll;
      outline:none;
    }

    /* ── AMBIENT ── */
    #bg,#bg-next{
      position:fixed;inset:-80px;
      background-size:cover;background-position:center;
      transform:scale(1.12);
      filter:blur(85px) saturate(1.3) brightness(.25);
      z-index:0;will-change:opacity;
    }
    #bg-next{opacity:0;transition:opacity .9s ease}
    #bg-veil{
      position:fixed;inset:0;z-index:1;pointer-events:none;
      background:
        radial-gradient(ellipse 90% 55% at 50% 0%,rgba(6,7,11,.15),rgba(6,7,11,.9)),
        linear-gradient(to bottom,rgba(6,7,11,.3),rgba(6,7,11,.6) 40%,rgba(6,7,11,1) 100%);
    }

    /* ── NAV ── */
    #nav{
      position:sticky;top:0;z-index:50;
      height:var(--nav-h);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 var(--pad);
      background:rgba(6,7,11,.7);
      backdrop-filter:blur(28px);
      border-bottom:1px solid rgba(255,255,255,.07);
    }
    .brand{font-size:26px;font-weight:700;letter-spacing:-.03em}
    .brand span{color:var(--text-3);font-weight:400}
    .nav-keys{display:flex;gap:10px;color:var(--text-3);font-size:12px}
    .kc{
      display:inline-flex;align-items:center;gap:7px;
      padding:6px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
    }
    .kc b{
      display:inline-block;min-width:22px;padding:2px 6px;
      border-radius:7px;background:rgba(255,255,255,.1);
      color:var(--text-2);font-weight:700;text-align:center;font-size:11px;
    }

    /* ── HERO ── */
    #hero{
      position:relative;min-height:68vh;
      display:flex;align-items:flex-end;
      padding:40px var(--pad) 52px;
    }
    #hero-bg{
      position:absolute;inset:0;
      background-size:cover;background-position:center;
      opacity:.35;
      transition:background-image .5s ease;
    }
    #hero-bg::after{
      content:"";position:absolute;inset:0;
      background:
        linear-gradient(to right,rgba(6,7,11,.92) 0%,rgba(6,7,11,.5) 40%,rgba(6,7,11,.15) 70%,rgba(6,7,11,.6) 100%),
        linear-gradient(to top,rgba(6,7,11,1) 0%,rgba(6,7,11,.4) 50%,rgba(6,7,11,.15) 100%);
    }
    #hero-body{position:relative;z-index:2;max-width:820px}
    #hero-label{
      color:var(--text-3);text-transform:uppercase;letter-spacing:.18em;
      font-size:12px;margin-bottom:16px;
      display:flex;align-items:center;gap:12px;
    }
    #hero-label::before{content:"";width:26px;height:1px;background:rgba(255,255,255,.2)}
    #hero-title{
      font-size:clamp(38px,5.5vw,80px);line-height:.95;
      letter-spacing:-.04em;margin-bottom:18px;
      text-shadow:0 6px 36px rgba(0,0,0,.5);
      min-height:1em;
    }
    #hero-overview{
      color:var(--text-2);font-size:clamp(15px,1.6vw,19px);
      line-height:1.55;max-width:680px;margin-bottom:20px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    #hero-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    #hero-cast{
      font-size:14px;color:var(--text-3);margin-bottom:20px;min-height:18px;
    }
    .pill{
      display:inline-flex;align-items:center;
      padding:7px 13px;border-radius:999px;
      background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);
      color:var(--text-2);font-size:13px;font-weight:500;
    }
    .pill.gold{color:var(--gold);border-color:rgba(255,213,74,.25);background:rgba(255,213,74,.07)}
    #hero-actions{display:flex;gap:12px;flex-wrap:wrap}
    .btn{
      border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);
      color:var(--text);padding:13px 18px;border-radius:12px;
      font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
      transition:transform 120ms,border-color 120ms,background 120ms;
    }
    .btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.13)}
    .btn.primary{background:rgba(255,255,255,.94);color:#0c0e14}
    #hero-trailer-btn{display:none}

    /* ── ROWS ── */
    #rows{position:relative;z-index:5;padding-bottom:80px}
    .row{margin-bottom:8px}
    .row-head{display:flex;align-items:center;gap:14px;padding:22px var(--pad) 14px}
    .row-name{
      font-size:22px;font-weight:700;letter-spacing:-.03em;
      color:var(--text-3);transition:color 200ms;white-space:nowrap;
    }
    .row.active .row-name{color:var(--text)}
    .row-line{flex:1;height:1px;background:rgba(255,255,255,.07);transition:background 200ms}
    .row.active .row-line{background:rgba(255,255,255,.14)}
    .row-loading-dot{
      width:6px;height:6px;border-radius:50%;
      background:var(--gold);opacity:0;transition:opacity .3s;flex-shrink:0;
    }
    .row.loading-more .row-loading-dot{opacity:1;animation:pulse 1s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

    /* Right-edge fade — infinite feel */
    .row-outer{position:relative}
    .row-outer::after{
      content:"";position:absolute;top:0;right:0;bottom:0;width:120px;
      pointer-events:none;z-index:2;
      background:linear-gradient(to right,transparent,rgba(6,7,11,.9));
    }
    .row-wrap{overflow:hidden;padding:6px var(--pad) 28px}
    .row-track{
      display:flex;gap:var(--card-gap);
      transition:transform .45s cubic-bezier(.25,.8,.25,1);
      will-change:transform;
    }

    /* ── CARDS ── */
    .card{
      position:relative;flex:0 0 var(--card-w);width:var(--card-w);
      background:var(--panel);border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;
      box-shadow:0 14px 38px rgba(0,0,0,.2);
      transition:transform .2s cubic-bezier(.34,1.4,.64,1),border-color .2s,box-shadow .2s,opacity .2s;
    }
    .row.active .card:not(.focused){opacity:.72}
    .card.focused{
      transform:scale(1.07) translateY(-7px);
      border-color:var(--border-hi);background:var(--panel-hi);
      box-shadow:0 30px 72px rgba(0,0,0,.5);z-index:4;
    }
    .card-img-wrap{position:relative;aspect-ratio:16/9;background:rgba(255,255,255,.04)}
    .card-img-wrap::after{
      content:"";position:absolute;inset:auto 0 0 0;height:45%;
      background:linear-gradient(to bottom,transparent,rgba(10,12,18,.85));
      pointer-events:none;z-index:1;
    }
    .card img{width:100%;height:100%;object-fit:cover;display:block}
    .card-video{
      position:absolute;inset:0;background:#000;
      opacity:0;transition:opacity .3s;pointer-events:none;z-index:2;
    }
    .card-video.on{opacity:1}
    .card-video iframe{width:100%;height:100%;border:0}
    .card-body{padding:12px 14px 14px}
    .card-title{
      font-size:16px;font-weight:700;letter-spacing:-.02em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px;
    }
    .card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .card-year{font-size:12px;color:var(--text-3)}
    .card-rating{font-size:12px;font-weight:700;color:var(--gold)}
    .card-cast{font-size:11px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:15px}

    /* ── DETAIL ── */
    #detail{
      position:fixed;inset:0;z-index:100;pointer-events:none;
      background:rgba(3,4,8,0);transition:background .2s,backdrop-filter .2s;
      backdrop-filter:blur(0px);
    }
    #detail.open{pointer-events:all;background:rgba(3,4,8,.8);backdrop-filter:blur(12px)}
    #detail-panel{
      position:absolute;inset:4vh 3.5vw;border-radius:22px;overflow:hidden;
      border:1px solid rgba(255,255,255,.11);background:rgba(10,12,18,.94);
      box-shadow:0 48px 120px rgba(0,0,0,.65);
      transform:translateY(18px) scale(.97);opacity:0;
      transition:transform .22s ease,opacity .22s ease;
      display:flex;flex-direction:column;
    }
    #detail.open #detail-panel{transform:none;opacity:1}
    #d-back-wrap{position:relative;aspect-ratio:21/8;flex-shrink:0;background:rgba(255,255,255,.04)}
    #d-back-wrap::after{
      content:"";position:absolute;inset:auto 0 0 0;height:72%;
      background:linear-gradient(to bottom,transparent,rgba(10,12,18,.97));pointer-events:none;
    }
    #d-backdrop{width:100%;height:100%;object-fit:cover;display:block}
    #d-close{
      position:absolute;top:16px;right:16px;z-index:2;
      width:40px;height:40px;border-radius:50%;
      border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.4);
      color:#fff;font-size:20px;cursor:pointer;font-family:inherit;
    }
    #d-body{overflow-y:auto;padding:24px 32px 36px;flex:1}
    #d-title{font-size:clamp(28px,3.5vw,50px);line-height:1;letter-spacing:-.04em;margin-bottom:8px}
    #d-tagline{color:var(--text-3);font-size:16px;font-style:italic;margin-bottom:16px}
    #d-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    #d-cast-label{color:var(--text-3);text-transform:uppercase;letter-spacing:.14em;font-size:10px;margin-bottom:10px}
    #d-cast{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
    .cast-chip{
      padding:9px 12px;border-radius:10px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
      color:var(--text-2);font-size:13px;
    }
    #d-overview{color:var(--text-2);line-height:1.72;font-size:15px}
    #d-trailer-btn{display:none;margin-bottom:18px}

    /* ── VIDEO OVERLAY ── */
    #vid-overlay{
      position:fixed;inset:0;z-index:200;
      background:rgba(0,0,0,.9);backdrop-filter:blur(8px);
      display:none;align-items:center;justify-content:center;
    }
    #vid-overlay.open{display:flex}
    #vid-panel{
      width:min(94vw,1360px);aspect-ratio:16/9;position:relative;
      background:#000;border-radius:16px;overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
    }
    #vid-close{
      position:absolute;top:12px;right:12px;z-index:2;
      width:40px;height:40px;border-radius:50%;
      border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.5);
      color:#fff;font-size:20px;cursor:pointer;font-family:inherit;
    }
    #vid-frame{width:100%;height:100%;border:0}

    /* ── LOADING SCREEN ── */
    #loading-screen{
      position:fixed;inset:0;z-index:300;
      background:var(--bg);
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:20px;
      transition:opacity .4s ease;
    }
    #loading-screen.hidden{opacity:0;pointer-events:none}
    .spinner{
      width:36px;height:36px;border-radius:50%;
      border:2px solid rgba(255,255,255,.1);
      border-top-color:rgba(255,255,255,.6);
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:14px;color:var(--text-3);letter-spacing:.06em}
  </style>
</head>
<body tabindex="0">

<div id="bg"></div>
<div id="bg-next"></div>
<div id="bg-veil"></div>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">Loading…</div>
</div>

<nav id="nav">
  <div class="brand">Movie<span>Browser</span></div>
  <div class="nav-keys">
    <span class="kc"><b>↑↓</b> rows</span>
    <span class="kc"><b>←→</b> browse</span>
    <span class="kc"><b>OK</b> details</span>
    <span class="kc"><b>Back</b> close</span>
  </div>
</nav>

<section id="hero">
  <div id="hero-bg"></div>
  <div id="hero-body">
    <div id="hero-label">Tonight's pick</div>
    <div id="hero-title"></div>
    <div id="hero-overview"></div>
    <div id="hero-pills"></div>
    <div id="hero-cast"></div>
    <div id="hero-actions">
      <button class="btn primary" id="hero-open-btn">Open details</button>
      <button class="btn" id="hero-next-btn">Next →</button>
      <button class="btn" id="hero-trailer-btn">Watch trailer</button>
    </div>
  </div>
</section>

<section id="rows"></section>

<!-- Detail panel -->
<div id="detail">
  <div id="detail-panel">
    <div id="d-back-wrap">
      <img id="d-backdrop" alt="">
      <button id="d-close">×</button>
    </div>
    <div id="d-body">
      <h2 id="d-title"></h2>
      <div id="d-tagline"></div>
      <div id="d-pills"></div>
      <button class="btn" id="d-trailer-btn">Watch trailer</button>
      <div id="d-cast-label">Top cast</div>
      <div id="d-cast"></div>
      <div id="d-overview"></div>
    </div>
  </div>
</div>

<!-- Video overlay -->
<div id="vid-overlay">
  <div id="vid-panel">
    <button id="vid-close">×</button>
    <iframe id="vid-frame" src="" title="Trailer"
      allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────────────────────────
  // CONFIG
  // ─────────────────────────────────────────────────────────────────
  const API_BASE = "https://movie-browsing.hanig.workers.dev";
  const IMG  = (p,s="w780")  => p ? `https://image.tmdb.org/t/p/${s}${p}` : "";
  const BACK = (p,s="w1280") => p ? `https://image.tmdb.org/t/p/${s}${p}` : "";
  const CARD_W  = 340;
  const CARD_G  = 16;
  const NAV_H   = 68;
  const HOVER_DELAY = 2000;
  const LOAD_MORE_THRESHOLD = 8; // cards from end before fetching more

  const LANES = [
    { key:"tonight",   label:"Best pick for tonight"  },
    { key:"trending",  label:"Trending now"            },
    { key:"popular",   label:"Popular now"             },
    { key:"reviewers", label:"Reviewers love"          },
    { key:"crowd",     label:"Crowd favourites"        },
    { key:"short",     label:"Under 100 minutes"       },
    { key:"beautiful", label:"Slow and beautiful"      },
    { key:"thrill",    label:"High-stakes thrill"      },
    { key:"cult",      label:"Cult favourites"         },
    { key:"scifi",     label:"Sci-fi worlds"           },
    { key:"crime",     label:"Crime and tension"       },
    { key:"uplifting", label:"Warm and uplifting"      },
    { key:"dark",      label:"Dark and unsettling"     },
    { key:"family",    label:"Family animation"        },
    { key:"hidden",    label:"Hidden gems"             },
  ];

  // ─────────────────────────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────────────────────────
  let rows        = [];   // {lane, movies[], trackEl, wrapEl, sectionEl, page, busy}
  let focRow      = 0;
  let focCol      = {};   // rowIndex → colIndex
  let detailOpen  = false;
  let movieCache  = {};
  let heroTrailer = null;
  let dTrailer    = null;
  let ambUrl      = "";
  let hoverTimer  = null;
  let heroDebounce= null;

  // ─────────────────────────────────────────────────────────────────
  // API
  // ─────────────────────────────────────────────────────────────────
  async function apiFetch(path) {
    const r = await fetch(API_BASE + path);
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  async function fetchLane(key, page=1) {
    const d = await apiFetch(`/api/browse?intent=${key}&page=${page}`);
    return (d.results||[]).filter(m => m && (m.backdrop_path||m.poster_path));
  }

  async function fetchMovie(id) {
    if (movieCache[id]) return movieCache[id];
    const d = await apiFetch(`/api/movie?id=${id}`);
    movieCache[id] = d;
    return d;
  }

  // ─────────────────────────────────────────────────────────────────
  // UTILS
  // ─────────────────────────────────────────────────────────────────
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function year(m){ return (m.release_date||"").slice(0,4)||"—"; }
  function stars(m){ return m.vote_average ? `★ ${m.vote_average.toFixed(1)}` : "★ —"; }

  function trailer(movie) {
    const vids = movie?.videos?.results||[];
    for (const t of ["Trailer","Teaser","Clip","Featurette"]) {
      const v = vids.find(v=>v.site==="YouTube"&&v.type===t&&v.key);
      if (v) return `https://www.youtube.com/embed/${v.key}?autoplay=1&mute=1&rel=0&playsinline=1`;
    }
    const any = vids.find(v=>v.site==="YouTube"&&v.key);
    return any ? `https://www.youtube.com/embed/${any.key}?autoplay=1&mute=1&rel=0&playsinline=1` : null;
  }

  function castNames(movie, n=3) {
    return (movie?.credits?.cast||[]).slice(0,n).map(a=>a.name).join(" · ");
  }

  // ─────────────────────────────────────────────────────────────────
  // AMBIENT
  // ─────────────────────────────────────────────────────────────────
  const bgEl   = document.getElementById("bg");
  const bgNext = document.getElementById("bg-next");

  function setAmbient(url) {
    if (!url || url === ambUrl) return;
    ambUrl = url;
    bgNext.style.backgroundImage = `url("${url}")`;
    bgNext.style.opacity = "1";
    setTimeout(()=>{ bgEl.style.backgroundImage=`url("${url}")`; bgNext.style.opacity="0"; }, 900);
  }

  // ─────────────────────────────────────────────────────────────────
  // HERO
  // ─────────────────────────────────────────────────────────────────
  async function setHero(movie, laneName) {
    document.getElementById("hero-label").textContent = laneName;
    document.getElementById("hero-title").textContent = movie.title||"";
    document.getElementById("hero-overview").textContent = movie.overview||"";
    document.getElementById("hero-pills").innerHTML =
      `<span class="pill gold">${stars(movie)}</span><span class="pill">${year(movie)}</span>`;
    document.getElementById("hero-cast").textContent = "";

    const backUrl = BACK(movie.backdrop_path||movie.poster_path);
    if (backUrl) {
      setAmbient(backUrl);
      document.getElementById("hero-bg").style.backgroundImage = `url("${backUrl}")`;
    }

    heroTrailer = null;
    document.getElementById("hero-trailer-btn").style.display = "none";

    // Fetch full details in background (cast + trailer)
    try {
      const full = await fetchMovie(movie.id);
      document.getElementById("hero-cast").textContent = castNames(full);
      const t = trailer(full);
      if (t) {
        heroTrailer = t;
        document.getElementById("hero-trailer-btn").style.display = "";
      }
    } catch(e){}
  }

  // ─────────────────────────────────────────────────────────────────
  // BUILD CARD
  // ─────────────────────────────────────────────────────────────────
  function buildCard(movie, rowIdx, colIdx) {
    const card = document.createElement("div");
    card.className = "card";

    const imgSrc = IMG(movie.backdrop_path,"w780") || IMG(movie.poster_path,"w500");

    card.innerHTML = `
      <div class="card-img-wrap">
        ${imgSrc ? `<img src="${imgSrc}" alt="${esc(movie.title||"")}" loading="lazy">` : ""}
        <div class="card-video" id="cv-${rowIdx}-${colIdx}"></div>
      </div>
      <div class="card-body">
        <div class="card-title">${esc(movie.title||"Untitled")}</div>
        <div class="card-row">
          <span class="card-year">${year(movie)}</span>
          <span class="card-rating">${stars(movie)}</span>
        </div>
        <div class="card-cast" id="cc-${rowIdx}-${colIdx}"></div>
      </div>`;

    // Mouse hover — 2 s delay then play
    card.addEventListener("mouseenter", () => {
      stopHover();
      if (detailOpen) return;
      hoverTimer = setTimeout(async () => {
        try {
          const full = await fetchMovie(movie.id);
          // cast
          const cc = document.getElementById(`cc-${rowIdx}-${colIdx}`);
          if (cc && !cc.textContent) cc.textContent = castNames(full);
          // video
          const cv = document.getElementById(`cv-${rowIdx}-${colIdx}`);
          const t  = trailer(full);
          if (cv && t && !detailOpen) {
            cv.innerHTML = `<iframe src="${t}" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
            cv.classList.add("on");
          }
        } catch(e){}
      }, HOVER_DELAY);
    });

    card.addEventListener("mouseleave", stopHover);
    card.addEventListener("click", () => {
      focRow = rowIdx;
      focCol[rowIdx] = colIdx;
      applyFocus(false);
      openDetail();
    });

    return card;
  }

  function stopHover() {
    clearTimeout(hoverTimer);
    // Stop all card videos
    document.querySelectorAll(".card-video.on").forEach(el => {
      el.classList.remove("on"); el.innerHTML = "";
    });
  }

  // ─────────────────────────────────────────────────────────────────
  // BUILD ROW
  // ─────────────────────────────────────────────────────────────────
  function buildRow(lane, movies, rowIdx) {
    const section = document.createElement("section");
    section.className = "row";
    section.innerHTML = `
      <div class="row-head">
        <div class="row-name">${esc(lane.label)}</div>
        <div class="row-loading-dot"></div>
        <div class="row-line"></div>
      </div>
      <div class="row-outer">
        <div class="row-wrap"><div class="row-track"></div></div>
      </div>`;

    document.getElementById("rows").appendChild(section);

    const trackEl = section.querySelector(".row-track");
    const wrapEl  = section.querySelector(".row-wrap");

    movies.forEach((m,i) => trackEl.appendChild(buildCard(m, rowIdx, i)));

    return { lane, movies:[...movies], trackEl, wrapEl, sectionEl:section, page:2, busy:false };
  }

  // ─────────────────────────────────────────────────────────────────
  // FOCUS
  // ─────────────────────────────────────────────────────────────────
  function applyFocus(scrollPage=true) {
    // Clear
    document.querySelectorAll(".card.focused").forEach(el=>el.classList.remove("focused"));
    document.querySelectorAll(".row.active").forEach(el=>el.classList.remove("active"));

    if (!rows.length) return;
    const ri  = Math.max(0, Math.min(focRow, rows.length-1));
    const row = rows[ri];
    if (!row) return;

    const ci  = Math.max(0, Math.min(focCol[ri]||0, row.movies.length-1));
    focCol[ri] = ci;

    const card = row.trackEl.children[ci];
    if (card) {
      card.classList.add("focused");

      // Scroll track so focused card is well within view
      const stride  = CARD_W + CARD_G;
      const wrapW   = row.wrapEl.clientWidth;
      const maxOff  = Math.max(0, row.movies.length * stride - wrapW);
      let   shift   = ci * stride - wrapW/2 + CARD_W/2;
      shift = Math.max(0, Math.min(shift, maxOff));
      row.trackEl.style.transform = `translateX(-${shift}px)`;
    }

    row.sectionEl.classList.add("active");

    // Scroll page to keep active row in comfortable view
    if (scrollPage) {
      const top = row.sectionEl.getBoundingClientRect().top + window.scrollY - NAV_H - 20;
      window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
    }

    // Update hero (debounced so rapid arrow-key navigation doesn't spam fetch)
    clearTimeout(heroDebounce);
    heroDebounce = setTimeout(() => {
      setHero(row.movies[ci], row.lane.label);
    }, 120);

    // Load more if near end
    maybeLoadMore(ri);
  }

  // ─────────────────────────────────────────────────────────────────
  // LOAD MORE (infinite)
  // ─────────────────────────────────────────────────────────────────
  async function maybeLoadMore(ri) {
    const row = rows[ri];
    if (!row || row.busy) return;
    if ((focCol[ri]||0) < row.movies.length - LOAD_MORE_THRESHOLD) return;

    row.busy = true;
    row.sectionEl.classList.add("loading-more");

    try {
      const newMovies = await fetchLane(row.lane.key, row.page);
      const existing  = new Set(row.movies.map(m=>m.id));
      const fresh     = newMovies.filter(m=>!existing.has(m.id));
      if (fresh.length) {
        fresh.forEach((m,i) => {
          const colIdx = row.movies.length;
          row.movies.push(m);
          row.trackEl.appendChild(buildCard(m, ri, colIdx));
        });
        row.page++;
      }
    } catch(e){ console.warn("load more:", e); }
    finally {
      row.busy = false;
      row.sectionEl.classList.remove("loading-more");
    }
  }

  // ─────────────────────────────────────────────────────────────────
  // DETAIL
  // ─────────────────────────────────────────────────────────────────
  async function openDetail() {
    const row   = rows[focRow];
    const movie = row?.movies[focCol[focRow]||0];
    if (!movie) return;

    stopHover();
    detailOpen = true;
    document.getElementById("detail").classList.add("open");

    document.getElementById("d-title").textContent    = "Loading…";
    document.getElementById("d-tagline").textContent  = "";
    document.getElementById("d-overview").textContent = "";
    document.getElementById("d-cast").innerHTML       = "";
    document.getElementById("d-backdrop").src         = "";
    document.getElementById("d-trailer-btn").style.display = "none";
    dTrailer = null;

    try {
      const full = await fetchMovie(movie.id);
      document.getElementById("d-title").textContent    = full.title||movie.title||"";
      document.getElementById("d-tagline").textContent  = full.tagline||"";
      document.getElementById("d-overview").textContent = full.overview||"";
      document.getElementById("d-pills").innerHTML = `
        <span class="pill gold">${stars(full)}</span>
        <span class="pill">${year(full)}</span>
        <span class="pill">${full.runtime ? full.runtime+"m" : "—"}</span>
        <span class="pill">${full.vote_count ? full.vote_count.toLocaleString()+" votes" : ""}</span>`;
      document.getElementById("d-cast").innerHTML =
        (full.credits?.cast||[]).slice(0,8)
          .map(p=>`<div class="cast-chip">${esc(p.name)}${p.character?` · ${esc(p.character)}`:""}</div>`)
          .join("") || "<div class='cast-chip'>Cast unavailable</div>";
      const backPath = full.backdrop_path||full.poster_path;
      if (backPath) document.getElementById("d-backdrop").src = BACK(backPath,"w1280");
      const t = trailer(full);
      if (t) {
        dTrailer = t;
        document.getElementById("d-trailer-btn").style.display = "";
      }
    } catch(e){ document.getElementById("d-title").textContent = "Could not load details."; }
  }

  function closeDetail() {
    detailOpen = false;
    document.getElementById("detail").classList.remove("open");
  }

  // ─────────────────────────────────────────────────────────────────
  // VIDEO OVERLAY
  // ─────────────────────────────────────────────────────────────────
  function openVideo(url) {
    if (!url) return;
    document.getElementById("vid-frame").src = url;
    document.getElementById("vid-overlay").classList.add("open");
  }

  function closeVideo() {
    document.getElementById("vid-frame").src = "";
    document.getElementById("vid-overlay").classList.remove("open");
  }

  // ─────────────────────────────────────────────────────────────────
  // KEYBOARD + TV REMOTE
  // All common TV remote D-pad keycodes covered.
  // ─────────────────────────────────────────────────────────────────
  const KEY = {
    UP:    [38, 19],
    DOWN:  [40, 20],
    LEFT:  [37, 21],
    RIGHT: [39, 22],
    OK:    [13, 32, 179],   // Enter, Space, MediaPlay
    BACK:  [8, 27, 461],    // Backspace, Escape, webOS back
  };

  function matchKey(code, group) { return KEY[group].includes(code); }

  document.addEventListener("keydown", e => {
    const c = e.keyCode || e.which;

    // Video overlay open
    if (document.getElementById("vid-overlay").classList.contains("open")) {
      if (matchKey(c,"BACK")) { e.preventDefault(); closeVideo(); }
      return;
    }

    // Detail open
    if (detailOpen) {
      if (matchKey(c,"BACK")) { e.preventDefault(); closeDetail(); }
      return;
    }

    if (!rows.length) return;
    const ri = focRow;
    const ci = focCol[ri]||0;

    if (matchKey(c,"RIGHT")) {
      e.preventDefault();
      focCol[ri] = ci + 1;
      applyFocus(false);
    } else if (matchKey(c,"LEFT")) {
      e.preventDefault();
      focCol[ri] = Math.max(0, ci - 1);
      applyFocus(false);
    } else if (matchKey(c,"DOWN")) {
      e.preventDefault();
      if (focRow < rows.length - 1) {
        focRow++;
        if (focCol[focRow] == null) focCol[focRow] = 0;
        applyFocus(true);
      }
    } else if (matchKey(c,"UP")) {
      e.preventDefault();
      if (focRow > 0) {
        focRow--;
        if (focCol[focRow] == null) focCol[focRow] = 0;
        applyFocus(true);
      }
    } else if (matchKey(c,"OK")) {
      e.preventDefault();
      openDetail();
    } else if (matchKey(c,"BACK")) {
      e.preventDefault();
      // no-op at top level
    }
  });

  // ─────────────────────────────────────────────────────────────────
  // BUTTON WIRING
  // ─────────────────────────────────────────────────────────────────
  document.getElementById("hero-open-btn").onclick    = openDetail;
  document.getElementById("hero-next-btn").onclick    = () => { focCol[focRow]=(focCol[focRow]||0)+1; applyFocus(false); };
  document.getElementById("hero-trailer-btn").onclick = () => openVideo(heroTrailer);
  document.getElementById("d-trailer-btn").onclick    = () => openVideo(dTrailer);
  document.getElementById("d-close").onclick          = closeDetail;
  document.getElementById("detail").onclick           = e => { if (e.target.id==="detail") closeDetail(); };
  document.getElementById("vid-close").onclick        = closeVideo;
  document.getElementById("vid-overlay").onclick      = e => { if (e.target.id==="vid-overlay") closeVideo(); };

  // ─────────────────────────────────────────────────────────────────
  // INIT — fast: first 2 lanes immediately, rest staggered
  // ─────────────────────────────────────────────────────────────────
  async function init() {
    // Ensure body has focus for remote control
    document.body.focus();

    try {
      // Load first 2 lanes in parallel — show UI fast
      const [m0, m1] = await Promise.all([
        fetchLane(LANES[0].key, 1),
        fetchLane(LANES[1].key, 1),
      ]);

      const firstBatch = [
        { lane:LANES[0], movies:m0 },
        { lane:LANES[1], movies:m1 },
      ].filter(x=>x.movies.length);

      firstBatch.forEach((x,i) => rows.push(buildRow(x.lane, x.movies, rows.length)));

      // Hide loading screen, show UI
      document.getElementById("loading-screen").classList.add("hidden");
      focRow = 0; focCol = { 0:0 };
      applyFocus(false);

      // Load remaining lanes one-by-one so we don't hammer the API
      for (let i = 2; i < LANES.length; i++) {
        try {
          const movies = await fetchLane(LANES[i].key, 1);
          if (movies.length) rows.push(buildRow(LANES[i], movies, rows.length));
        } catch(e){ console.warn(LANES[i].key, e); }
        // Small gap so the browser stays responsive
        await new Promise(r => setTimeout(r, 80));
      }

    } catch(e) {
      console.error(e);
      document.querySelector(".loading-text").textContent = "Failed to load. Check worker URL.";
    }
  }

  init();
</script>
