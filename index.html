<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Movie Browser</title>
<style>
/* System fonts only — no network request */
:root{
  --bg:#07080d;
  --card:#111318;
  --card-hi:#1a1d26;
  --bd:rgba(255,255,255,.10);
  --bd-hi:rgba(255,255,255,.40);
  --t1:rgba(255,255,255,.95);
  --t2:rgba(255,255,255,.60);
  --t3:rgba(255,255,255,.35);
  --gold:#ffd54a;
  --pad:52px;
  --cw:320px;
  --cg:14px;
  --nav:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--t1);
  overflow-x:hidden;overflow-y:scroll;
  outline:none;-webkit-tap-highlight-color:transparent;
}

/* Ambient: simple fixed image, NO blur filter */
#amb{
  position:fixed;inset:0;z-index:0;
  background-size:cover;background-position:center;
  opacity:0;transition:opacity 1s,background-image 0s;
}
#amb-shade{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  /* solid gradient — no blur, cheap on GPU */
  background:
    linear-gradient(to bottom,rgba(7,8,13,.82) 0%,rgba(7,8,13,.55) 30%,rgba(7,8,13,.85) 75%,rgba(7,8,13,1) 100%);
}

/* NAV — solid bg, no backdrop-filter */
#nav{
  position:sticky;top:0;z-index:50;height:var(--nav);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--pad);
  background:rgba(7,8,13,.95);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.brand{font-size:24px;font-weight:700;letter-spacing:-.02em}
.brand b{color:var(--t3);font-weight:400}
.keys{display:flex;gap:8px;font-size:11px;color:var(--t3)}
.key{
  padding:5px 9px;border-radius:6px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
}

/* HERO */
#hero{
  position:relative;z-index:2;
  min-height:62vh;display:flex;align-items:flex-end;
  padding:36px var(--pad) 44px;
}
#hero-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  opacity:.28;
}
#hero-img::after{
  content:"";position:absolute;inset:0;
  background:
    linear-gradient(to right,rgba(7,8,13,.95) 0%,rgba(7,8,13,.6) 45%,rgba(7,8,13,.2) 100%),
    linear-gradient(to top,rgba(7,8,13,1) 0%,rgba(7,8,13,.5) 45%,transparent 100%);
}
#hero-body{position:relative;z-index:2;max-width:760px}
#hero-lane{
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--t3);margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
}
#hero-lane::before{content:"";width:22px;height:1px;background:rgba(255,255,255,.2)}
#hero-title{
  font-size:clamp(34px,4.8vw,72px);line-height:.95;
  letter-spacing:-.035em;font-weight:700;
  margin-bottom:16px;min-height:1em;
}
#hero-overview{
  font-size:clamp(14px,1.4vw,17px);line-height:1.52;
  color:var(--t2);max-width:620px;margin-bottom:18px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
#hero-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
#hero-cast{font-size:13px;color:var(--t3);margin-bottom:20px;min-height:16px}
.pill{
  display:inline-flex;align-items:center;
  padding:6px 12px;border-radius:999px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);
  color:var(--t2);font-size:13px;font-weight:500;
}
.pill.gold{color:var(--gold);border-color:rgba(255,213,74,.22);background:rgba(255,213,74,.06)}
#hero-btns{display:flex;gap:10px}
.btn{
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.09);
  color:var(--t1);padding:12px 16px;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;
  /* NO transform transitions — slow on webOS */
}
.btn.pri{background:rgba(255,255,255,.92);color:#07080d}
#hero-trailer-btn{display:none}

/* ROWS */
#rows{position:relative;z-index:2;padding-bottom:60px}
.row{margin-bottom:6px}
.row-head{display:flex;align-items:center;gap:12px;padding:20px var(--pad) 12px}
.row-name{
  font-size:20px;font-weight:700;letter-spacing:-.025em;
  color:var(--t3);white-space:nowrap;
  transition:color .15s;
}
.row.active .row-name{color:var(--t1)}
.row-line{flex:1;height:1px;background:rgba(255,255,255,.06)}
.row.active .row-line{background:rgba(255,255,255,.14)}
.row-spinner{
  width:14px;height:14px;border-radius:50%;flex-shrink:0;
  border:1.5px solid rgba(255,255,255,.12);
  border-top-color:var(--gold);
  display:none;
  animation:spin .6s linear infinite;
}
.row.loading .row-spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Right fade — feels infinite */
.row-outer{position:relative;overflow:hidden}
.row-outer::after{
  content:"";position:absolute;top:0;right:0;bottom:0;width:100px;
  background:linear-gradient(to right,transparent,rgba(7,8,13,.9));
  pointer-events:none;z-index:2;
}
.row-wrap{overflow:hidden;padding:6px var(--pad) 24px}
.row-track{
  display:flex;gap:var(--cg);
  /* Use translate3d — tells WebOS to use compositor */
  transition:transform .3s cubic-bezier(.25,.8,.25,1);
  will-change:transform;
  transform:translate3d(0,0,0);
}

/* CARDS */
.card{
  flex:0 0 var(--cw);width:var(--cw);
  background:var(--card);border:2px solid transparent;
  border-radius:10px;overflow:hidden;
  /* Simple box-shadow, no blur */
  box-shadow:0 8px 24px rgba(0,0,0,.3);
  transition:border-color .15s;
  /* NO scale transform — compositing is expensive on budget WebOS */
}
.card.focused{
  border-color:var(--bd-hi);
  background:var(--card-hi);
  box-shadow:0 0 0 1px rgba(255,255,255,.12),0 16px 48px rgba(0,0,0,.5);
}
.row.active .card:not(.focused){opacity:.7}
.card-img{
  width:100%;aspect-ratio:16/9;
  object-fit:cover;display:block;
  background:rgba(255,255,255,.04);
}
.card-body{padding:11px 13px 13px}
.card-title{
  font-size:15px;font-weight:700;letter-spacing:-.015em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:6px;
}
.card-row{display:flex;justify-content:space-between;margin-bottom:5px}
.card-year{font-size:12px;color:var(--t3)}
.card-rating{font-size:12px;font-weight:700;color:var(--gold)}
.card-cast{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* DETAIL — solid bg, no backdrop-filter */
#detail{
  position:fixed;inset:0;z-index:100;
  display:none;
  background:rgba(7,8,13,.96);
  overflow-y:auto;
}
#detail.open{display:block}
#d-back-wrap{position:relative;aspect-ratio:21/8;background:#111}
#d-back-wrap::after{
  content:"";position:absolute;inset:auto 0 0 0;height:75%;
  background:linear-gradient(to bottom,transparent,rgba(7,8,13,.98));
  pointer-events:none;
}
#d-backdrop{width:100%;height:100%;object-fit:cover;display:block}
#d-close{
  position:absolute;top:14px;right:14px;z-index:2;
  width:38px;height:38px;border-radius:50%;
  border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.6);
  color:#fff;font-size:20px;cursor:pointer;font-family:inherit;
}
#d-body{padding:22px 32px 40px;max-width:900px}
#d-title{font-size:clamp(26px,3vw,46px);font-weight:700;letter-spacing:-.03em;margin-bottom:8px}
#d-tagline{color:var(--t3);font-size:15px;font-style:italic;margin-bottom:14px}
#d-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
#d-trailer-btn{display:none;margin-bottom:18px}
#d-cast-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
#d-cast{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chip{
  padding:8px 12px;border-radius:8px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:var(--t2);font-size:13px;
}
#d-overview{color:var(--t2);line-height:1.7;font-size:15px}

/* VIDEO */
#vid{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.95);
  display:none;align-items:center;justify-content:center;
}
#vid.open{display:flex}
#vid-panel{width:min(96vw,1280px);aspect-ratio:16/9;position:relative;background:#000;border-radius:12px;overflow:hidden}
#vid-close{
  position:absolute;top:10px;right:10px;z-index:2;
  width:38px;height:38px;border-radius:50%;
  border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.6);
  color:#fff;font-size:18px;cursor:pointer;font-family:inherit;
}
#vid-frame{width:100%;height:100%;border:0}

/* LOADING */
#splash{
  position:fixed;inset:0;z-index:300;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:18px;
}
#splash.gone{display:none}
.splash-logo{font-size:32px;font-weight:700;letter-spacing:-.02em;color:var(--t2)}
.splash-spin{
  width:32px;height:32px;border-radius:50%;
  border:2px solid rgba(255,255,255,.1);border-top-color:var(--t2);
  animation:spin .6s linear infinite;
}
</style>
</head>
<body tabindex="0">

<div id="amb"></div>
<div id="amb-shade"></div>

<div id="splash">
  <div class="splash-logo">Movie Browser</div>
  <div class="splash-spin"></div>
</div>

<nav id="nav">
  <div class="brand">Movie<b>Browser</b> <span style="font-size:11px;font-weight:400;color:var(--t3);letter-spacing:.05em;">v4</span></div>
  <div class="keys">
    <span class="key">↑↓ rows</span>
    <span class="key">←→ browse</span>
    <span class="key">OK open</span>
    <span class="key">Back close</span>
  </div>
</nav>

<section id="hero">
  <div id="hero-img"></div>
  <div id="hero-body">
    <div id="hero-lane">Tonight's pick</div>
    <div id="hero-title"> </div>
    <div id="hero-overview"> </div>
    <div id="hero-meta"></div>
    <div id="hero-cast"> </div>
    <div id="hero-btns">
      <button class="btn pri" id="hero-open">Open details</button>
      <button class="btn" id="hero-next">Next →</button>
      <button class="btn" id="hero-trailer-btn">▶ Trailer</button>
    </div>
  </div>
</section>

<section id="rows"></section>

<div id="detail">
  <div id="d-back-wrap">
    <img id="d-backdrop" alt="">
    <button id="d-close">×</button>
  </div>
  <div id="d-body">
    <h2 id="d-title"></h2>
    <div id="d-tagline"></div>
    <div id="d-pills"></div>
    <button class="btn" id="d-trailer-btn">▶ Watch trailer</button>
    <div id="d-cast-lbl">Top cast</div>
    <div id="d-cast"></div>
    <div id="d-overview"></div>
  </div>
</div>

<div id="vid">
  <div id="vid-panel">
    <button id="vid-close">×</button>
    <iframe id="vid-frame" src="" title="Trailer" allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<script>
var API = "https://movie-browsing.hanig.workers.dev";
var IMG  = function(p,s){ return p ? "https://image.tmdb.org/t/p/"+(s||"w500")+p : ""; };
var BACK = function(p){ return p ? "https://image.tmdb.org/t/p/w1280"+p : ""; };

var LANES = [
  {key:"tonight",  label:"Tonight's pick"},
  {key:"trending", label:"Trending now"},
  {key:"popular",  label:"Popular"},
  {key:"reviewers",label:"Critics' choice"},
  {key:"crowd",    label:"Crowd favourites"},
  {key:"short",    label:"Under 100 min"},
  {key:"beautiful",label:"Slow & beautiful"},
  {key:"thrill",   label:"High-stakes thrill"},
  {key:"cult",     label:"Cult favourites"},
  {key:"scifi",    label:"Sci-fi worlds"},
  {key:"crime",    label:"Crime & tension"},
  {key:"uplifting",label:"Warm & uplifting"},
  {key:"dark",     label:"Dark & unsettling"},
  {key:"family",   label:"Family"},
  {key:"hidden",   label:"Hidden gems"},
];

// State
var rows       = [];
var focRow     = 0;
var focCol     = {};
var detailOpen = false;
var vidOpen    = false;
var cache      = {};
var heroTimer  = null;
var heroTrl    = null;
var dTrl       = null;
var ambSet     = "";

// ── UTILS ────────────────────────────────────────────────
function esc(s){
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function yr(m){ return (m.release_date||"").slice(0,4)||"—"; }
function stars(m){ return m.vote_average ? "★ "+m.vote_average.toFixed(1) : "★ —"; }
function getTrailerUrl(m){
  var vids = (m&&m.videos&&m.videos.results)||[];
  var order = ["Trailer","Teaser","Clip","Featurette"];
  for(var i=0;i<order.length;i++){
    var v = vids.filter(function(v){ return v.site==="YouTube"&&v.type===order[i]&&v.key; })[0];
    if(v) return "https://www.youtube.com/embed/"+v.key+"?autoplay=1&mute=1&rel=0";
  }
  var any = vids.filter(function(v){ return v.site==="YouTube"&&v.key; })[0];
  return any ? "https://www.youtube.com/embed/"+any.key+"?autoplay=1&mute=1&rel=0" : null;
}
function castStr(m,n){
  return ((m&&m.credits&&m.credits.cast)||[]).slice(0,n||3).map(function(a){return a.name;}).join(" · ");
}

// ── API ──────────────────────────────────────────────────
function apiFetch(path, cb){
  var xhr = new XMLHttpRequest();
  xhr.open("GET", API+path, true);
  xhr.onload = function(){
    if(xhr.status===200){
      try{ cb(null, JSON.parse(xhr.responseText)); }
      catch(e){ cb(e); }
    } else { cb(new Error(xhr.status)); }
  };
  xhr.onerror = function(){ cb(new Error("network")); };
  xhr.send();
}

function fetchLane(key, page, cb){
  apiFetch("/api/browse?intent="+key+"&page="+(page||1), function(err,d){
    if(err||!d||!d.results) return cb([]);
    cb(d.results.filter(function(m){ return m&&(m.backdrop_path||m.poster_path); }));
  });
}

function fetchMovie(id, cb){
  if(cache[id]) return cb(null,cache[id]);
  apiFetch("/api/movie?id="+id, function(err,d){
    if(!err&&d) cache[id]=d;
    cb(err,d);
  });
}

// ── AMBIENT (no blur — just the image faded) ─────────────
function setAmbient(url){
  if(!url||url===ambSet) return;
  ambSet = url;
  var el = document.getElementById("amb");
  el.style.backgroundImage = "url("+url+")";
  el.style.opacity = "0.22";
}

// ── HERO ─────────────────────────────────────────────────
function setHero(movie, laneName){
  document.getElementById("hero-lane").textContent     = laneName;
  document.getElementById("hero-title").textContent    = movie.title||"";
  document.getElementById("hero-overview").textContent = movie.overview||"";
  document.getElementById("hero-meta").innerHTML       =
    "<span class='pill gold'>"+stars(movie)+"</span><span class='pill'>"+yr(movie)+"</span>";
  document.getElementById("hero-cast").textContent     = "";
  document.getElementById("hero-trailer-btn").style.display = "none";
  heroTrl = null;

  var back = movie.backdrop_path||movie.poster_path;
  if(back){
    var url = BACK(back);
    setAmbient(url);
    document.getElementById("hero-img").style.backgroundImage = "url("+url+")";
  }

  // Fetch full in background for cast + trailer
  fetchMovie(movie.id, function(err, full){
    if(!full) return;
    document.getElementById("hero-cast").textContent = castStr(full);
    var t = getTrailerUrl(full);
    if(t){ heroTrl = t; document.getElementById("hero-trailer-btn").style.display = ""; }
  });
}

// ── BUILD CARD ────────────────────────────────────────────
function buildCard(movie, rowIdx, colIdx){
  var card = document.createElement("div");
  card.className = "card";

  var imgSrc = IMG(movie.backdrop_path,"w500") || IMG(movie.poster_path,"w342");

  card.innerHTML =
    (imgSrc ? "<img class='card-img' src='"+imgSrc+"' alt='"+esc(movie.title)+"' loading='lazy'>" : "<div class='card-img'></div>")+
    "<div class='card-body'>"+
      "<div class='card-title'>"+esc(movie.title||"Untitled")+"</div>"+
      "<div class='card-row'>"+
        "<span class='card-year'>"+yr(movie)+"</span>"+
        "<span class='card-rating'>"+stars(movie)+"</span>"+
      "</div>"+
      "<div class='card-cast' id='cc-"+rowIdx+"-"+colIdx+"'></div>"+
    "</div>";

  card.onclick = function(){
    focRow = rowIdx;
    focCol[rowIdx] = colIdx;
    applyFocus(false);
    openDetail();
  };

  return card;
}

// ── BUILD ROW ─────────────────────────────────────────────
function buildRow(lane, movies, rowIdx){
  var section = document.createElement("section");
  section.className = "row";
  section.innerHTML =
    "<div class='row-head'>"+
      "<div class='row-name'>"+esc(lane.label)+"</div>"+
      "<div class='row-spinner'></div>"+
      "<div class='row-line'></div>"+
    "</div>"+
    "<div class='row-outer'>"+
      "<div class='row-wrap'><div class='row-track'></div></div>"+
    "</div>";
  document.getElementById("rows").appendChild(section);

  var track = section.querySelector(".row-track");
  var wrap  = section.querySelector(".row-wrap");
  movies.forEach(function(m,i){ track.appendChild(buildCard(m,rowIdx,i)); });

  var row = {lane:lane, movies:movies.slice(), track:track, wrap:wrap, el:section, page:2, busy:false};
  rows.push(row);
  return row;
}

// ── FOCUS ─────────────────────────────────────────────────
function applyFocus(scroll){
  var i, cards, rows2;
  // Clear
  rows2 = document.querySelectorAll(".row.active"); for(i=0;i<rows2.length;i++) rows2[i].classList.remove("active");
  cards = document.querySelectorAll(".card.focused"); for(i=0;i<cards.length;i++) cards[i].classList.remove("focused");

  var ri  = Math.max(0, Math.min(focRow, rows.length-1));
  var row = rows[ri];
  if(!row) return;

  var maxci = row.movies.length-1;
  var ci    = Math.max(0, Math.min(focCol[ri]||0, maxci));
  focCol[ri] = ci;

  var card = row.track.children[ci];
  if(card) card.classList.add("focused");

  row.el.classList.add("active");

  // Slide track
  var stride = (parseInt(getComputedStyle(document.documentElement).getPropertyValue("--cw"))||320)
             + (parseInt(getComputedStyle(document.documentElement).getPropertyValue("--cg"))||14);
  var wrapW  = row.wrap.clientWidth;
  var maxOff = Math.max(0, row.movies.length*stride - wrapW);
  var shift  = Math.max(0, Math.min(ci*stride - wrapW/2 + stride/2, maxOff));
  row.track.style.transform = "translate3d(-"+shift+"px,0,0)";

  // Scroll page — explicit, accounts for nav height
  if(scroll!==false){
    var top = row.el.getBoundingClientRect().top + window.pageYOffset - 68 - 16;
    window.scrollTo(0, Math.max(0,top));
  }

  // Hero (debounced 100ms so rapid keys don't fire fetches)
  clearTimeout(heroTimer);
  heroTimer = setTimeout(function(){ setHero(row.movies[ci], row.lane.label); }, 100);

  // Populate cast for focused card
  (function(m,r,c){
    fetchMovie(m.id, function(err,full){
      if(!full) return;
      var el = document.getElementById("cc-"+r+"-"+c);
      if(el&&!el.textContent) el.textContent = castStr(full);
    });
  })(row.movies[ci], ri, ci);

  // Load more near end
  if(ci >= row.movies.length - 8) loadMore(ri);
}

// ── LOAD MORE ─────────────────────────────────────────────
function loadMore(ri){
  var row = rows[ri];
  if(!row||row.busy) return;
  row.busy = true;
  row.el.classList.add("loading");
  fetchLane(row.lane.key, row.page, function(movies){
    var exist = {};
    row.movies.forEach(function(m){ exist[m.id]=1; });
    movies.forEach(function(m){
      if(exist[m.id]) return;
      var col = row.movies.length;
      row.movies.push(m);
      row.track.appendChild(buildCard(m, ri, col));
    });
    row.page++;
    row.busy = false;
    row.el.classList.remove("loading");
  });
}

// ── DETAIL ────────────────────────────────────────────────
function openDetail(){
  var row = rows[focRow];
  var m   = row&&row.movies[focCol[focRow]||0];
  if(!m) return;

  detailOpen = true;
  var el = document.getElementById("detail");
  el.classList.add("open");
  el.scrollTop = 0;

  document.getElementById("d-title").textContent    = "Loading…";
  document.getElementById("d-tagline").textContent  = "";
  document.getElementById("d-overview").textContent = "";
  document.getElementById("d-cast").innerHTML       = "";
  document.getElementById("d-pills").innerHTML      = "";
  document.getElementById("d-backdrop").src         = "";
  document.getElementById("d-trailer-btn").style.display = "none";
  dTrl = null;

  fetchMovie(m.id, function(err, full){
    if(!full){ document.getElementById("d-title").textContent="Could not load."; return; }
    document.getElementById("d-title").textContent    = full.title||m.title||"";
    document.getElementById("d-tagline").textContent  = full.tagline||"";
    document.getElementById("d-overview").textContent = full.overview||"";
    document.getElementById("d-pills").innerHTML =
      "<span class='pill gold'>"+stars(full)+"</span>"+
      "<span class='pill'>"+yr(full)+"</span>"+
      (full.runtime?"<span class='pill'>"+full.runtime+"m</span>":"")+
      (full.vote_count?"<span class='pill'>"+full.vote_count.toLocaleString()+" votes</span>":"");
    document.getElementById("d-cast").innerHTML =
      ((full.credits&&full.credits.cast)||[]).slice(0,8)
        .map(function(p){ return "<div class='chip'>"+esc(p.name)+(p.character?" · "+esc(p.character):"")+"</div>"; })
        .join("")||"<div class='chip'>Cast unavailable</div>";
    var back = full.backdrop_path||full.poster_path;
    if(back) document.getElementById("d-backdrop").src = BACK(back);
    var t = getTrailerUrl(full);
    if(t){ dTrl=t; document.getElementById("d-trailer-btn").style.display=""; }
  });
}

function closeDetail(){
  detailOpen = false;
  document.getElementById("detail").classList.remove("open");
}

// ── VIDEO ─────────────────────────────────────────────────
function openVid(url){
  if(!url) return;
  document.getElementById("vid-frame").src = url;
  document.getElementById("vid").classList.add("open");
  vidOpen = true;
}
function closeVid(){
  document.getElementById("vid-frame").src = "";
  document.getElementById("vid").classList.remove("open");
  vidOpen = false;
}

// ── KEYBOARD / TV REMOTE ──────────────────────────────────
// Covers: standard keyboard, LG webOS, Samsung Tizen, Android TV
var UP    = {38:1,19:1};
var DOWN  = {40:1,20:1};
var LEFT  = {37:1,21:1};
var RIGHT = {39:1,22:1};
var OK    = {13:1,32:1};
var BACK  = {8:1,27:1,461:1,10009:1};  // Backspace, Esc, webOS Back, Tizen Back

document.addEventListener("keydown", function(e){
  var c = e.keyCode||e.which;

  if(vidOpen){
    if(BACK[c]){ e.preventDefault(); closeVid(); }
    return;
  }
  if(detailOpen){
    if(BACK[c]){ e.preventDefault(); closeDetail(); }
    return;
  }
  if(!rows.length) return;

  var ri = focRow;
  var ci = focCol[ri]||0;

  if(RIGHT[c]){
    e.preventDefault();
    focCol[ri] = ci+1;
    applyFocus(false);
  } else if(LEFT[c]){
    e.preventDefault();
    if(ci>0){ focCol[ri]=ci-1; applyFocus(false); }
  } else if(DOWN[c]){
    e.preventDefault();
    if(focRow<rows.length-1){
      focRow++;
      if(focCol[focRow]==null) focCol[focRow]=0;
      applyFocus(true);
    }
  } else if(UP[c]){
    e.preventDefault();
    if(focRow>0){
      focRow--;
      if(focCol[focRow]==null) focCol[focRow]=0;
      applyFocus(true);
    }
  } else if(OK[c]){
    e.preventDefault();
    openDetail();
  } else if(BACK[c]){
    e.preventDefault();
  }
});

// ── BUTTONS ───────────────────────────────────────────────
document.getElementById("hero-open").onclick        = openDetail;
document.getElementById("hero-next").onclick        = function(){ focCol[focRow]=(focCol[focRow]||0)+1; applyFocus(false); };
document.getElementById("hero-trailer-btn").onclick = function(){ openVid(heroTrl); };
document.getElementById("d-trailer-btn").onclick    = function(){ openVid(dTrl); };
document.getElementById("d-close").onclick          = closeDetail;
document.getElementById("vid-close").onclick        = closeVid;

// ── INIT ──────────────────────────────────────────────────
// Load ONE lane first — show UI in under 1 second
// Then trickle in remaining lanes one at a time
function init(){
  document.body.focus();

  fetchLane(LANES[0].key, 1, function(movies){
    document.getElementById("splash").className = "gone";

    if(!movies.length){
      document.getElementById("hero-title").textContent = "Failed to load. Check worker.";
      return;
    }

    buildRow(LANES[0], movies, 0);
    focRow = 0; focCol = {0:0};
    applyFocus(false);

    // Load remaining lanes sequentially, 300ms apart
    // Sequential = only 1 XHR in flight at a time = no congestion on budget TV
    var idx = 1;
    function nextLane(){
      if(idx >= LANES.length) return;
      var lane = LANES[idx++];
      fetchLane(lane.key, 1, function(movies){
        if(movies.length) buildRow(lane, movies, rows.length);
        setTimeout(nextLane, 300);
      });
    }
    setTimeout(nextLane, 300);
  });
}

init();
</script>
